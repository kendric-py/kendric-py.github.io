<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        body.light {
            background-color: #f0f2f5;
            color: #1a1a2e;
        }

        body.dark {
            background-color: #0a0a1a;
            color: #e0e0f0;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(72, 149, 239, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(147, 51, 234, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.12) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        body.dark::before {
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(72, 149, 239, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(147, 51, 234, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.07) 0%, transparent 50%);
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 3%) rotate(8deg); }
        }

        .container {
            padding: 48px 40px;
            border-radius: 24px;
            max-width: 440px;
            width: 90%;
            position: relative;
            z-index: 2;
            animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            overflow: hidden;
        }

        body.light .container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 4px 6px rgba(0, 0, 0, 0.02),
                0 12px 40px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        body.dark .container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 
                0 4px 6px rgba(0, 0, 0, 0.1),
                0 12px 40px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            border-radius: 0 0 24px 24px;
            background: linear-gradient(90deg, #4895ef, #9333ea, #06b6d4);
            background-size: 200% 100%;
            animation: progressFill 5s linear forwards, progressGlow 2s ease-in-out infinite;
            width: 0%;
        }

        @keyframes progressFill {
            to { width: 100%; }
        }

        @keyframes progressGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 13px;
            line-height: 1.7;
            margin-top: 24px;
            font-weight: 400;
            white-space: pre-line;
        }

        body.light p {
            color: #6b7280;
        }

        body.dark p {
            color: #9ca3af;
        }

        a.button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border-radius: 14px;
            text-decoration: none;
            color: #ffffff;
            background: linear-gradient(135deg, #4895ef 0%, #7c3aed 50%, #06b6d4 100%);
            background-size: 200% 200%;
            animation: btnGradient 4s ease infinite;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s ease;
            box-shadow: 0 4px 16px rgba(72, 149, 239, 0.25);
            letter-spacing: -0.01em;
        }

        a.button::after {
            content: '→';
            font-size: 18px;
            transition: transform 0.25s ease;
        }

        a.button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 28px rgba(72, 149, 239, 0.35);
        }

        a.button:hover::after {
            transform: translateX(4px);
        }

        a.button:active {
            transform: translateY(0) scale(0.98);
        }

        @keyframes btnGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .icon-redirect {
            width: 48px;
            height: 48px;
            margin: 0 auto 24px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: iconPulse 3s ease-in-out infinite;
        }

        body.light .icon-redirect {
            background: linear-gradient(135deg, rgba(72, 149, 239, 0.12), rgba(124, 58, 237, 0.12));
        }

        body.dark .icon-redirect {
            background: linear-gradient(135deg, rgba(72, 149, 239, 0.15), rgba(124, 58, 237, 0.15));
        }

        .icon-redirect svg {
            width: 24px;
            height: 24px;
        }

        body.light .icon-redirect svg {
            color: #4895ef;
        }

        body.dark .icon-redirect svg {
            color: #7cabf5;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 36px 24px;
                border-radius: 20px;
            }
            a.button {
                padding: 14px 28px;
                font-size: 15px;
                border-radius: 12px;
            }
        }
    </style>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const currentURL = window.location.href;
    let redirectTo = decodeURIComponent(currentURL.split('redirect_to=')[1] || '');
    const language = navigator.language || navigator.userLanguage;
    const isRussian = language.startsWith('ru');

    const titleText = isRussian ? 'Продолжить' : 'Continue';
    const buttonText = isRussian ? 'Нажмите сюда, чтобы продолжить' : 'Click here to proceed';
    const instructionsText = isRussian
      ? 'Переадресация произойдёт автоматически в течение 5 секунд.\nЕсли этого не произошло, нажмите на кнопку выше.'
      : 'You will be redirected automatically within 5 seconds.\nIf nothing happens, please click the button above.';

    // document.getElementById('title').innerText = titleText;
    const linkEl = document.getElementById('redirectLink');
    linkEl.innerText = buttonText;
    linkEl.href = redirectTo;
    document.getElementById('instructions').innerText = instructionsText;

    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.body.classList.add('dark');
    } else {
      document.body.classList.add('light');
    }

    let redirectTimer;

    if (redirectTo) {
      redirectTimer = setTimeout(() => {
        window.location.href = redirectTo;
      }, 5000);

      linkEl.addEventListener('click', function () {
        clearTimeout(redirectTimer);
      });
    } else {
      alert(isRussian ? 'Не указана ссылка для перенаправления.' : 'No redirect link specified.');
    }
  });
</script>
</head>
<body>
    <div class="container">
        <div class="icon-redirect">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
            </svg>
        </div>
        <a id="redirectLink" class="button" href="#" target="_blank">Click here to proceed</a>
        <p id="instructions">To continue, please click the button above.</p>
        <div class="progress-bar"></div>
    </div>
</body>
</html>
